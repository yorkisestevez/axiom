<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scanlines" x1="0" y1="0" x2="0" y2="4" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#000000"/>
  <rect width="960" height="620" fill="url(#scanlines)"/>

  <!-- Subtle grid -->
  <g stroke="#00ff41" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="320" x2="960" y2="320"/>
    <line x1="0" y1="480" x2="960" y2="480"/>
  </g>

  <!-- Terminal window chrome -->
  <rect x="20" y="20" width="920" height="580" rx="6" fill="#030603" stroke="#0f1f0f" stroke-width="1"/>
  <rect x="20" y="20" width="920" height="32" rx="6" fill="#060a06"/>
  <rect x="20" y="44" width="920" height="8" fill="#060a06"/>
  <circle cx="42" cy="36" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="36" r="6" fill="#febc2e"/>
  <circle cx="82" cy="36" r="6" fill="#28c840"/>
  <text x="480" y="41" text-anchor="middle" fill="#3a5a3a" font-size="11">axiom@0x00 ~ /boot</text>

  <!-- Terminal content -->
  <g font-size="13" filter="url(#glow)">

    <!-- Boot sequence -->
    <text x="44" y="85" fill="#00ff41">&gt; <tspan fill="#7a9a7a">INITIALIZING AXIOM_OS</tspan></text>
    <text x="44" y="105" fill="#00ff41">&gt; <tspan fill="#7a9a7a">LOADING NEURAL CORTEX ............. </tspan><tspan fill="#00ff41" font-weight="bold">OK</tspan></text>
    <text x="44" y="125" fill="#00ff41">&gt; <tspan fill="#7a9a7a">ESTABLISHING SECURE CHANNEL ..... </tspan><tspan fill="#00ff41" font-weight="bold">OK</tspan></text>
    <text x="44" y="145" fill="#00ff41">&gt; <tspan fill="#7a9a7a">STATUS: </tspan><tspan fill="#00ff41" font-weight="bold">ONLINE</tspan></text>

    <!-- First command: system audit -->
    <text x="44" y="185" fill="#00ff41">$ <tspan fill="#00ffff">node core/system-audit.js</tspan></text>

    <text x="44" y="215" fill="#00ff41" font-weight="bold">=== AXIOM SYSTEM AUDIT ===</text>
    <text x="44" y="235" fill="#c0ffc0">Ollama       <tspan fill="#00ff41">▸ RUNNING</tspan></text>
    <text x="44" y="253" fill="#7a9a7a">  Models     qwen2.5-coder:7b (4.6GB), gemma4:e4b (3.2GB)</text>
    <text x="44" y="271" fill="#7a9a7a">  VRAM       7958 / 12288 MB <tspan fill="#00ff41">[65%]</tspan></text>
    <text x="44" y="289" fill="#c0ffc0">RAM          14.4 / 31.8 GB <tspan fill="#00ff41">[45% free]</tspan></text>
    <text x="44" y="307" fill="#c0ffc0">Status       <tspan fill="#00ff41" font-weight="bold">ALL SYSTEMS NOMINAL</tspan></text>

    <!-- Second command: gap detector -->
    <text x="44" y="345" fill="#00ff41">$ <tspan fill="#00ffff">npx axiom-check</tspan></text>

    <text x="44" y="375" fill="#7a9a7a">  ▸ Walking files... <tspan fill="#c0ffc0">342 files indexed</tspan></text>
    <text x="44" y="393" fill="#7a9a7a">  ▸ Applying 12 gap rules... <tspan fill="#c0ffc0">done in 180ms</tspan></text>

    <text x="44" y="423" fill="#ff003c">  ● HIGH  </text>
    <text x="130" y="423" fill="#c0ffc0" font-weight="bold">Missing RLS policies <tspan fill="#7a9a7a">(14 hits)</tspan></text>
    <text x="130" y="441" fill="#7a9a7a">→ Multi-tenant SaaS requires RLS from day 1</text>

    <text x="44" y="471" fill="#ffcc00">  ● MED   </text>
    <text x="130" y="471" fill="#c0ffc0" font-weight="bold">Tailwind v3 deprecated classes <tspan fill="#7a9a7a">(47 hits)</tspan></text>
    <text x="130" y="489" fill="#7a9a7a">→ bg-gradient-to-* renamed to bg-linear-to-*</text>

    <text x="44" y="519" fill="#00ff41">  ● LOW   </text>
    <text x="130" y="519" fill="#c0ffc0" font-weight="bold">Manual useMemo/useCallback <tspan fill="#7a9a7a">(89 hits)</tspan></text>
    <text x="130" y="537" fill="#7a9a7a">→ React Compiler handles this automatically</text>

    <!-- Prompt with blinking cursor -->
    <text x="44" y="577" fill="#00ff41">$ <tspan fill="#c0ffc0">_</tspan></text>
    <rect x="59" y="566" width="10" height="14" fill="#00ff41">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00ff41" stroke-width="2" fill="none" opacity="0.6">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="900,30 930,30 930,60"/>
    <polyline points="30,560 30,590 60,590"/>
    <polyline points="900,590 930,590 930,560"/>
  </g>

  <!-- Footer label -->
  <text x="480" y="615" text-anchor="middle" fill="#3a5a3a" font-size="10">github.com/yorkisestevez/axiom</text>
</svg>

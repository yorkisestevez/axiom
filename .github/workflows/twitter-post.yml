name: Twitter Auto-Post

on:
  schedule:
    # Every 12 hours: 9am and 5pm EST (14:00 and 22:00 UTC)
    - cron: '7 14,22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print, do not post)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Post tweet
        if: github.event.inputs.dry_run != 'true'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node scripts/twitter-post.js

      - name: Dry run
        if: github.event.inputs.dry_run == 'true'
        run: node scripts/twitter-post.js --dry-run

      - name: Commit updated state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/tweet-state.json
          git diff --cached --quiet || git commit -m "chore: advance tweet queue state [skip ci]"
          git push

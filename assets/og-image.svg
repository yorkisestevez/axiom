<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <linearGradient id="scanlines" x1="0" y1="0" x2="0" y2="4" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Base black -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Subtle grid -->
  <g stroke="#00ff41" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- HUD Corner brackets -->
  <g stroke="#00ff41" stroke-width="3" fill="none" opacity="0.7">
    <polyline points="60,130 60,90 100,90"/>
    <polyline points="1100,90 1140,90 1140,130"/>
    <polyline points="60,500 60,540 100,540"/>
    <polyline points="1100,540 1140,540 1140,500"/>
  </g>

  <!-- Classified badge -->
  <g>
    <rect x="400" y="140" width="400" height="38" fill="none" stroke="#00ff41" stroke-width="1.5"/>
    <text x="600" y="166" text-anchor="middle" fill="#00ff41" font-size="14" letter-spacing="3">[ CLASSIFIED // OPEN SOURCE ]</text>
  </g>

  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" fill="#c0ffc0" font-size="56" font-weight="800">Your AI doesn't just</text>
  <text x="600" y="340" text-anchor="middle" fill="#00ff41" font-size="72" font-weight="800" letter-spacing="-2">execute. It evolves.</text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" fill="#7a9a7a" font-size="22">
    A self-improving AI operating system that learns from every build session.
  </text>

  <!-- Stats row -->
  <g font-size="18">
    <text x="300" y="470" text-anchor="middle" fill="#00ff41" font-size="36" font-weight="800">14</text>
    <text x="300" y="495" text-anchor="middle" fill="#3a5a3a" font-size="12" letter-spacing="2">CORE MODULES</text>

    <text x="500" y="470" text-anchor="middle" fill="#00ff41" font-size="36" font-weight="800">11</text>
    <text x="500" y="495" text-anchor="middle" fill="#3a5a3a" font-size="12" letter-spacing="2">RESEARCH DOMAINS</text>

    <text x="700" y="470" text-anchor="middle" fill="#00ff41" font-size="36" font-weight="800">0</text>
    <text x="700" y="495" text-anchor="middle" fill="#3a5a3a" font-size="12" letter-spacing="2">DEPENDENCIES</text>

    <text x="900" y="470" text-anchor="middle" fill="#00ff41" font-size="36" font-weight="800">∞</text>
    <text x="900" y="495" text-anchor="middle" fill="#3a5a3a" font-size="12" letter-spacing="2">SELF IMPROVEMENT</text>
  </g>

  <!-- Try it -->
  <g>
    <rect x="390" y="545" width="420" height="45" fill="#030603" stroke="#00ff41" stroke-width="2"/>
    <text x="600" y="574" text-anchor="middle" fill="#00ff41" font-size="20" font-weight="700">$ npx axiom-check</text>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Bottom label -->
  <text x="600" y="615" text-anchor="middle" fill="#3a5a3a" font-size="12" letter-spacing="2">GITHUB.COM/YORKISESTEVEZ/AXIOM</text>
</svg>
